name: Daily QA check

on:
  schedule:
    - cron: '0 9 * * *'

jobs:
  create-qa-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `test: daily QA regression check`,
              labels: ['test', 'automation'],
              body: `Scheduled daily QA regression check.\n\n## Protocol\n1. Run full BDD test suite (\`npm run test:bdd\`)\n2. Capture and compare results with previous daily report\n3. Report pass/fail and any regressions found\n\nSee qa-agent.md for the full daily QA protocol.`
            });
