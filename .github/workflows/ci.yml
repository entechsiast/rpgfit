name: CI
on:
  pull_request:
    branches: [master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-react-app/package-lock.json
      - run: npm ci
        working-directory: my-react-app
      - run: npm test
        working-directory: my-react-app
      - run: npm run build
        working-directory: my-react-app
